name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: self-hosted # Uses your server as the runner
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Deploy
        run: |
          cd ~/marketing-agent-generation
          git pull origin main
          npm ci
          npm run build
          npx pm2 restart marketing-agent
          npx pm2 logs marketing-agent --lines 5 --nostream
